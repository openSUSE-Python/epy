name: Run Tests

on:
  workflow_dispatch:
  pull_request:
    branches: [master]
  push:
    branches: [master]
    paths:
      - src/**
      - tests/**

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: 'pip'
      - name: Install Project
        run: pip install --user .[dev]
      - name: Run tests
        run: |
          mypy . || true
          pytest -vv tests
